{{ block "register" . }}
<!DOCTYPE html>
<html>

<head>
  <title>Register In Go Forum</title>
  <link rel="stylesheet" href="/style.css">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
  <form action="/register" method="Post">
    <div id="formDiv">
      <span id="formTitle">Register New Account</span>
      <input type="text" name="username" placeholder="Enter username" required>
      <input type="email" name="email" placeholder="Enter your email adress" required>
      <input type="password" name="password" placeholder="Enter strong password"
        pattern="^(?=.*\d)(?=.*[a-zA-Z])(?=.*[^a-zA-Z0-9])\S{8,}$"
        title="Password must contain at least one number, one alphabet, one symbol, and be at least 8 characters long"
        required>
      <button type="submit" class="submitButton">Register</button>
    </div>
  </form>
</body>

</html>
{{ end }}
