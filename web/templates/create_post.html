{{define "title"}}New post{{end}}

{{define "content"}}
<div class="auth-form" style="max-width:580px;">
    <h2>New post</h2>
    <form action="/api/posts/create" method="POST">
        <div class="field">
            <label>Title</label>
            <input type="text" name="title" maxlength="60" placeholder="What's this about?" required>
        </div>
        <div class="field">
            <label>Content</label>
            <textarea name="content" placeholder="Write your post…" required rows="9"></textarea>
        </div>
        <div class="field">
            <label>Categories</label>
            <div class="category-selection">
                {{range .Categories}}
                <label>
                    <input type="checkbox" name="categories" value="{{.ID}}">
                    {{.Name}}
                </label>
                {{end}}
            </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Publish</button>
    </form>
</div>
{{end}}
