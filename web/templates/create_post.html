{{define "title"}}Create Post{{end}}

{{define "content"}}
<div class="auth-form" style="max-width: 600px;">
    <h2>Create New Post</h2>
    <form action="/api/posts/create" method="POST">
        <div class="field">
            <label>Title</label>
            <input name="title" required rows="10"
                style="width: 100%; padding: 0.625rem; border: 1px solid var(--border); border-radius: 0.375rem; box-sizing: border-box; font-family: inherit; font-size: inherit;" aria-required="true"></textarea>
        </div>
        <div class="field">
            <label>Content</label>
            <textarea name="content" required rows="10"
            style="width: 100%; padding: 0.625rem; border: 1px solid var(--border); border-radius: 0.375rem; box-sizing: border-box; font-family: inherit; font-size: inherit;" aria-required="true"></textarea>
        </div>
        <div class="field">
            <label>Categories (Select one or more)</label>
            <div class="category-selection" style="display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem;">
                {{range .Categories}}
                <label style="background: #f1f5f9; padding: 0.25rem 0.5rem; border-radius: 0.25rem; cursor: pointer;">
                    <input type="checkbox" name="categories" value="{{.ID}}"
                        style="width: auto; margin-right: 0.25rem;">
                    {{.Name}}
                </label>
                {{end}}
            </div>
        </div>
        <button type="submit">Publish Post</button>
    </form>
</div>
{{end}}
