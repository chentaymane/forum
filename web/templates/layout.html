{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{template "title" .}} — Forum</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <a href="/" class="brand">Forum<em>.</em></a>
            </div>
            <div class="nav-right">
                {{if .User}}
                <span class="nav-welcome">{{.User.Username}}</span>
                <a href="/create-post" class="nav-link">New post</a>
                <form action="/auth/logout" method="POST" style="display:inline;">
                    <button type="submit" class="btn btn-ghost btn-sm">Log out</button>
                </form>
                {{else}}
                <a href="/login" class="nav-link">Log in</a>
                <a href="/register" class="btn btn-primary btn-sm">Register</a>
                {{end}}
            </div>
        </nav>
    </header>
    <main>
        {{template "content" .}}
    </main>
    <footer>
        <p>&copy; 2026 Forum</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('a.btn-back, a[data-back]').forEach(function (btn) {
                btn.addEventListener('click', function (e) {
                    if (document.referrer && document.referrer !== window.location.href) {
                        e.preventDefault();
                        history.back();
                    }
                });
            });
        });
    </script>
</body>
</html>
{{end}}
