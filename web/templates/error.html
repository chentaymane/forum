<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error {{.Code}} — Forum</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-left">
                <a href="/" class="brand">Forum<em>.</em></a>
            </div>
        </nav>
    </header>
    <main>
        
<div class="error-page">
    <h2>{{.Code}}</h2>
    <p>{{.Message}}</p>
    <a href="/" class="btn btn-ghost" data-back>
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5-7 7 7 7"/></svg>
        Go back
    </a>
</div>
    </main>
    <footer>
        <p>&copy; 2026 Forum</p>
    </footer>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            document.querySelectorAll('a.btn-back, a[data-back]').forEach(function (btn) {
                btn.addEventListener('click', function (e) {
                    if (document.referrer && document.referrer !== window.location.href) {
                        e.preventDefault();
                        history.back();
                    }
                });
            });
        });
    </script>
</body>
</html>
