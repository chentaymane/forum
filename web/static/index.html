<!DOCTYPE html>
<!-- ═══════════════════════════════════════════════════════════════════════════
     Forum — Single Page Application
     ═══════════════════════════════════════════════════════════════════════════
     This is the ONLY HTML file in the project.  The entire application is
     rendered by JavaScript (web/static/app.js) and styled by CSS
     (web/static/style.css).

     Layout:
       1. Auth view  – shown when the user is not logged in (login/register)
       2. App view   – main grid: left sidebar (people) + center (feed/detail)
       3. Chat popup – floating Facebook-style messenger overlay
       4. Toast      – small notification at the bottom
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forum</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- ─── Page Shell ──────────────────────────────────────────────────── -->
  <div class="shell">

    <!-- ─── Auth View (shown when logged OUT) ─────────────────────────── -->
    <section id="auth-view" class="auth-view">
      <div class="auth-container">

        <!-- Branding -->
        <div class="auth-brand">
          <h1 class="auth-logo">Forum<span class="auth-logo-dot">.</span></h1>
          <p class="auth-tagline">Connect. Share. Discuss.</p>
        </div>

        <!-- Login form -->
        <div class="auth-card">
          <h2 class="auth-card-title">Welcome back</h2>
          <form id="login-form" class="form-stack">
            <label class="field">
              <span class="field-label">Nickname or email</span>
              <input name="login" type="text" autocomplete="username" placeholder="e.g. johndoe" required />
            </label>
            <label class="field">
              <span class="field-label">Password</span>
              <input name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
            </label>
            <button class="btn btn-primary btn-full" type="submit">Sign in</button>
          </form>
          <p class="auth-switch">Don't have an account? <a href="#" id="show-register" class="auth-link">Register</a></p>
        </div>

        <!-- Register form -->
        <div class="auth-card" id="register-card" style="display:none;">
          <h2 class="auth-card-title">Create account</h2>
          <form id="register-form" class="form-stack">
            <div class="grid-2">
              <label class="field">
                <span class="field-label">Nickname</span>
                <input name="nickname" autocomplete="nickname" placeholder="coolcat42" required />
              </label>
              <label class="field">
                <span class="field-label">Age</span>
                <input name="age" type="number" min="13" max="120" placeholder="25" required />
              </label>
            </div>
            <label class="field">
              <span class="field-label">Gender</span>
              <select name="gender" required>
                <option value="">Select one</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
                <option value="prefer_not_to_say">Prefer not to say</option>
              </select>
            </label>
            <div class="grid-2">
              <label class="field">
                <span class="field-label">First name</span>
                <input name="first_name" autocomplete="given-name" placeholder="John" required />
              </label>
              <label class="field">
                <span class="field-label">Last name</span>
                <input name="last_name" autocomplete="family-name" placeholder="Doe" required />
              </label>
            </div>
            <label class="field">
              <span class="field-label">E-mail</span>
              <input name="email" type="email" autocomplete="email" placeholder="john@example.com" required />
            </label>
            <label class="field">
              <span class="field-label">Password <span class="field-hint">min 8 chars, upper + lower + digit + symbol</span></span>
              <input name="password" type="password" autocomplete="new-password" placeholder="••••••••" required />
            </label>
            <button class="btn btn-primary btn-full" type="submit">Create account</button>
          </form>
          <p class="auth-switch">Already have an account? <a href="#" id="show-login" class="auth-link">Sign in</a></p>
        </div>

      </div>
    </section>

    <!-- ─── App View (shown when logged IN) ───────────────────────────── -->
    <section id="app-view" class="app-view hidden">

      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="brand">Forum<span class="brand-dot">.</span></h1>
        </div>
        <div class="topbar-right">
          <span id="connection-status" class="status-pill">Offline</span>
          <span id="user-badge" class="user-badge hidden"></span>
          <button id="logout-button" class="btn btn-ghost btn-sm hidden" type="button">Logout</button>
        </div>
      </header>

      <!-- Main 2‑column grid -->
      <div class="app-grid">

        <!-- ── LEFT sidebar: People ───────────────────────────────────── -->
        <aside class="panel sidebar sidebar-left">
          <div class="sidebar-header">
            <h2 class="sidebar-title">People</h2>
            <input id="contact-search" class="search-input" placeholder="Search users…" />
          </div>
          <div id="contacts-list" class="contact-list"></div>
        </aside>

        <!-- ── CENTER column: Feed + Post Detail ─────────────────────── -->
        <main class="content-column">

          <!-- Composer (new post) -->
          <section class="panel composer">
            <div class="panel-header">
              <h2 class="panel-title">New post</h2>
              <span class="panel-subtitle">Share something with the community</span>
            </div>
            <form id="post-form" class="form-stack">
              <label class="field">
                <span class="field-label">Title</span>
                <input name="title" maxlength="60" placeholder="An interesting title…" required />
              </label>
              <label class="field">
                <span class="field-label">Content</span>
                <textarea name="content" rows="4" maxlength="2000" placeholder="What's on your mind?" required></textarea>
              </label>
              <div class="field">
                <span class="field-label">Categories</span>
                <div id="category-list" class="chip-grid"></div>
              </div>
              <button class="btn btn-primary" type="submit">Publish post</button>
            </form>
          </section>

          <!-- Feed -->
          <section class="panel feed">
            <div class="panel-header">
              <div>
                <h2 class="panel-title">Feed</h2>
                <span class="panel-subtitle">Browse recent discussions</span>
              </div>
              <div class="feed-controls">
                <select id="category-filter" class="feed-select"></select>
                <button id="refresh-posts" class="btn btn-ghost btn-sm" type="button" title="Refresh">↻</button>
              </div>
            </div>
            <div id="posts-list" class="cards"></div>
          </section>

          <!-- Post Detail (shown when a post is clicked) -->
          <section id="post-detail-panel" class="panel detail hidden">
            <div class="panel-header">
              <div>
                <h2 id="detail-title" class="panel-title">Post</h2>
                <p id="detail-meta" class="detail-meta"></p>
              </div>
              <button id="close-detail" class="btn btn-ghost btn-sm" type="button">✕ Close</button>
            </div>
            <div id="detail-categories" class="chip-row"></div>
            <div id="detail-content" class="detail-body"></div>
            <div id="detail-reactions" class="reaction-bar"></div>

            <div class="comment-section">
              <h3 class="comment-heading">Comments</h3>
              <form id="comment-form" class="inline-form">
                <input name="content" placeholder="Write a comment…" maxlength="500" required />
                <button class="btn btn-primary btn-sm" type="submit">Send</button>
              </form>
              <div id="comments-list" class="comment-list"></div>
            </div>
          </section>

        </main>

      </div>
    </section>

    <!-- ─── Chat Button (floating, bottom‑right) ─────────────────────── -->
    <button id="chat-button" class="chat-button hidden" type="button" title="Messages">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>

    <!-- ─── Chat Popup (Facebook‑style messenger overlay) ────────────── -->
    <div id="chat-popup" class="chat-popup hidden">

      <!-- Popup header -->
      <div class="chat-popup-header">
        <span class="chat-popup-title">Messages</span>
        <button id="chat-popup-close" class="btn btn-ghost btn-sm" type="button" title="Close">✕</button>
      </div>

      <!-- Contact / conversation switcher row -->
      <div class="chat-popup-tabs">
        <button id="chat-tab-recent" class="chat-tab active" type="button">Recent</button>
        <button id="chat-tab-all" class="chat-tab" type="button">All Users</button>
      </div>

      <!-- Search input (filters both tabs) -->
      <input id="chat-popup-search" class="search-input chat-popup-search" placeholder="Search by name…" />

      <!-- Contact list (recent or all) -->
      <div id="chat-popup-list" class="chat-popup-list"></div>

      <!-- Conversation view (hidden until a user is selected) -->
      <div id="chat-conversation" class="chat-conversation hidden">
        <div class="chat-conv-header">
          <button id="chat-conv-back" class="btn btn-ghost btn-sm" type="button">← Back</button>
          <span id="chat-conv-user" class="chat-conv-user"></span>
        </div>
        <div id="chat-conv-messages" class="chat-conv-messages"></div>
        <form id="message-form" class="message-form">
          <input type="hidden" name="receiver_id" />
          <textarea name="content" rows="1" maxlength="1000" placeholder="Type a message…" required></textarea>
          <button class="btn btn-primary btn-sm" type="submit">Send</button>
        </form>
      </div>
    </div>

    <!-- ─── Toast notification ────────────────────────────────────────── -->
    <p id="toast" class="toast hidden"></p>

  </div>

  <script src="/static/app.js"></script>
</body>
</html>
